      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --primary: 221.2 83.2% 53.3%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96%;

        --input: 214.3 31.8% 91.4%;
        --ring: 221.2 83.2% 53.3%;
        --radius: 0.75rem;
      }
      .dark {
        --background: 222.2 84% 4.9%;
        --foreground: 210 40% 98%;
        --primary: 217.2 91.2% 59.8%;
        --primary-foreground: 222.2 84% 4.9%;

      * {

        margin: 0;
        padding: 0;

      html { scroll-behavior: smooth; }

        -moz-osx-font-smoothing: grayscale;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        min-height: 100vh;

        display: flex;
        flex-direction: column;
        width: 100%;

        font-size: 1rem;
        color: hsl(var(--muted-foreground));

      /* Critical layout and component styles */
      img { max-width: 100%; height: auto; display: block; }
      button { cursor: pointer; border: 0; background: transparent; }
      a { text-decoration: none; color: inherit; }

      nav { position: relative; background: hsl(var(--background)); border-bottom: 1px solid hsl(var(--border)); }

      .flex-col { flex-direction: column; }
      .items-center { align-items: center; }

      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }

      .min-h-screen { min-height: 100vh; }
      .max-w-7xl { max-width: 80rem; }
      .mx-auto { margin-left: auto; margin-right: auto; }
      .bg-white { background-color: hsl(var(--background)); }
      .bg-gray-50 { background-color: hsl(210 40% 98%); }
      .text-gray-600 { color: hsl(215.4 16.3% 46.9%); }
      .text-gray-900 { color: hsl(var(--foreground)); }
      .border { border: 1px solid hsl(var(--border)); }
      .border-b { border-bottom: 1px solid hsl(var(--border)); }
      .rounded { border-radius: 0.25rem; }
      .rounded-lg { border-radius: 0.5rem; }
      .shadow { box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06); }
      .shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
      .transition { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
      .hover\:bg-gray-100:hover { background-color: hsl(210 40% 96%); }
      .hover\:text-primary:hover { color: hsl(var(--primary)); }
      .focus\:outline-none:focus { outline: 2px solid transparent; outline-offset: 2px; }
      .focus\:ring-2:focus { box-shadow: 0 0 0 2px hsl(var(--ring)); }
      @media (min-width: 768px) {
        .md\:flex { display: flex; }

      /* Hero section critical styles */

      .card { background: hsl(var(--background)); border: 1px solid hsl(var(--border)); border-radius: 0.5rem; overflow: hidden; }
      .grid { display: grid; }
      .grid-cols-1 { grid-template-columns: repeat(1, minmax(0, 1fr)); }

        .md\:grid-cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
